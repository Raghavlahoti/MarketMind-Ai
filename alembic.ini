# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, space-separated, to be appended to sys.path
# prepend_syspath = .

# timezone to use when rendering the date within the migration file
# timezone = UTC

# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version_path_separator = :

# version_path_separator = ;

# version_path_separator = space

[post_write_hooks]
# post_write_hooks defines scripts that are run after new migrations are generated
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REWRITE_INPUT

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
